name: Build RPL Studio Desktop

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    name: 🍎 Build macOS DMG
    runs-on: macos-14
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Get dependencies
        working-directory: apps/studio
        run: flutter pub get

      - name: 🏗️ Build macOS app
        working-directory: apps/studio
        run: flutter build macos --release

      - name: 💿 Package into DMG
        working-directory: apps/studio/build/macos/Build/Products/Release
        run: |
          mkdir dmg-staging
          cp -r rpl_studio.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "RPL Studio" -srcfolder dmg-staging -ov -format UDZO rpl-studio-macos.dmg

      - name: 📤 Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: rpl-studio-macos
          path: apps/studio/build/macos/Build/Products/Release/rpl-studio-macos.dmg
          retention-days: 7

  build-windows:
    name: 🪟 Build Windows Installer
    runs-on: windows-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Get dependencies
        working-directory: apps/studio
        run: flutter pub get

      - name: 🏗️ Build Windows app
        working-directory: apps/studio
        run: flutter build windows --release

      - name: 🔧 Install Inno Setup
        run: choco install innosetup -y

      - name: 📦 Build Installer
        working-directory: apps/studio
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "windows\rpl-studio.iss"

      - name: 📤 Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: rpl-studio-windows
          path: apps/studio/build/installer/RPL-Studio-Installer.exe
          retention-days: 7
