name: 🚀 Release RPL Installer

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ================================================================
  # BUILD — Compile RPL for each platform
  # ================================================================
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: rpl.exe
            artifact: rpl-windows-x64

          - name: macOS Intel
            os: macos-14
            target: x86_64-apple-darwin
            binary: rpl
            artifact: rpl-macos-x64

          - name: macOS Apple Silicon
            os: macos-14
            target: aarch64-apple-darwin
            binary: rpl
            artifact: rpl-macos-arm64

          - name: Linux x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: rpl
            artifact: rpl-linux-x64

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 📦 Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: 🔨 Build Release
        run: cargo build --release --target ${{ matrix.target }}

      - name: ✅ Test Binary
        run: ./target/${{ matrix.target }}/release/${{ matrix.binary }} --version
        shell: bash

      - name: 📤 Upload Binary Artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  # ================================================================
  # PACKAGE WINDOWS — Create .exe installer with NSIS
  # ================================================================
  package-windows:
    name: 📦 Windows Installer
    needs: build
    runs-on: windows-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 📥 Download Binary
        uses: actions/download-artifact@v5
        with:
          name: rpl-windows-x64
          path: staging/

      - name: 📁 Prepare Installer Files
        shell: bash
        run: |
          mkdir -p staging/examples staging/documentation
          cp examples/*.rpl staging/examples/ 2>/dev/null || true
          cp -r documentation/* staging/documentation/ 2>/dev/null || true
          cp LICENSE staging/

      - name: 🔧 Install NSIS
        run: choco install nsis -y

      - name: 🔧 Download EnvVarUpdate Plugin
        shell: powershell
        run: |
          # Download EnvVarUpdate NSIS plugin
          $nsisPluginsDir = "C:\Program Files (x86)\NSIS\Include"
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/winlibs/nsis/master/Include/EnvVarUpdate.nsh" -OutFile "$nsisPluginsDir\EnvVarUpdate.nsh" -ErrorAction SilentlyContinue
          # Fallback: Create a minimal EnvVarUpdate stub
          if (!(Test-Path "$nsisPluginsDir\EnvVarUpdate.nsh")) {
            @"
            !ifndef EnvVarUpdate_INCLUDED
            !define EnvVarUpdate_INCLUDED
            !macro _EnvVarUpdate_Impl ResultVar EnvVarName Action RegLoc PathString
              !define UNIQUE_ID `$${__LINE__}`
              ReadRegStr `$${ResultVar}` `$${RegLoc}` "SYSTEM\CurrentControlSet\Control\Session Manager\Environment" `$${EnvVarName}`
            !macroend
            !define EnvVarUpdate '!insertmacro _EnvVarUpdate_Impl'
            !define un.EnvVarUpdate '!insertmacro _EnvVarUpdate_Impl'
            !endif
            "@ | Out-File -FilePath "$nsisPluginsDir\EnvVarUpdate.nsh" -Encoding ascii
          }

      - name: 🏗️ Build NSIS Installer
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          # Use a simpler NSIS script that works without EnvVarUpdate
          cat > staging/rpl-setup.nsi << 'NSIS_EOF'
          !include "MUI2.nsh"
          
          !define PRODUCT_NAME "RPL"
          !define PRODUCT_FULLNAME "Rakoda Programming Language"
          !define PRODUCT_VERSION "1.0.0"
          !define PRODUCT_PUBLISHER "Restu Dwi Cahyo"
          !define PRODUCT_WEB_SITE "https://github.com/resitdc/rakoda-programming-language"
          !define PRODUCT_UNINST_KEY "Software\Microsoft\Windows\CurrentVersion\Uninstall\${PRODUCT_NAME}"
          
          Name "${PRODUCT_FULLNAME} ${PRODUCT_VERSION}"
          OutFile "RPL-Setup-${PRODUCT_VERSION}.exe"
          InstallDir "$PROGRAMFILES\RPL"
          RequestExecutionLevel admin
          SetCompressor /SOLID lzma
          
          !define MUI_ABORTWARNING
          !insertmacro MUI_PAGE_WELCOME
          !insertmacro MUI_PAGE_LICENSE "LICENSE"
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_PAGE_FINISH
          !insertmacro MUI_UNPAGE_CONFIRM
          !insertmacro MUI_UNPAGE_INSTFILES
          !insertmacro MUI_LANGUAGE "English"
          
          Section "Install"
              SetOutPath "$INSTDIR\bin"
              File "rpl.exe"
              
              SetOutPath "$INSTDIR\examples"
              File /nonfatal /r "examples\*.rpl"
              
              SetOutPath "$INSTDIR\docs"
              File /nonfatal /r "documentation\*.*"
              
              SetOutPath "$INSTDIR"
              File "LICENSE"
              
              ; Add to PATH using registry
              ReadRegStr $0 HKLM "SYSTEM\CurrentControlSet\Control\Session Manager\Environment" "Path"
              StrCpy $0 "$0;$INSTDIR\bin"
              WriteRegExpandStr HKLM "SYSTEM\CurrentControlSet\Control\Session Manager\Environment" "Path" "$0"
              SendMessage ${HWND_BROADCAST} ${WM_WININICHANGE} 0 "STR:Environment" /TIMEOUT=5000
              
              WriteUninstaller "$INSTDIR\uninstall.exe"
              WriteRegStr HKLM "${PRODUCT_UNINST_KEY}" "DisplayName" "${PRODUCT_FULLNAME}"
              WriteRegStr HKLM "${PRODUCT_UNINST_KEY}" "UninstallString" "$INSTDIR\uninstall.exe"
              WriteRegStr HKLM "${PRODUCT_UNINST_KEY}" "DisplayVersion" "${PRODUCT_VERSION}"
              WriteRegStr HKLM "${PRODUCT_UNINST_KEY}" "Publisher" "${PRODUCT_PUBLISHER}"
          SectionEnd
          
          Section "Uninstall"
              RMDir /r "$INSTDIR\bin"
              RMDir /r "$INSTDIR\examples"
              RMDir /r "$INSTDIR\docs"
              Delete "$INSTDIR\LICENSE"
              Delete "$INSTDIR\uninstall.exe"
              RMDir "$INSTDIR"
              DeleteRegKey HKLM "${PRODUCT_UNINST_KEY}"
          SectionEnd
          NSIS_EOF
          
          makensis staging/rpl-setup.nsi

      - name: 📤 Upload Windows Installer
        uses: actions/upload-artifact@v5
        with:
          name: installer-windows
          path: staging/RPL-Setup-*.exe

  # ================================================================
  # PACKAGE MACOS — Create .dmg
  # ================================================================
  package-macos:
    name: 📦 macOS DMG (${{ matrix.arch }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-14
            arch: x64
            artifact: rpl-macos-x64
          - os: macos-14
            arch: arm64
            artifact: rpl-macos-arm64
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 📥 Download Binary
        uses: actions/download-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: target/release/

      - name: 🔧 Make Binary Executable
        run: chmod +x target/release/rpl

      - name: 🏗️ Build DMG
        run: |
          chmod +x installer/macos/build-dmg.sh
          installer/macos/build-dmg.sh ${{ matrix.arch }}

      - name: 📤 Upload macOS DMG
        uses: actions/upload-artifact@v5
        with:
          name: installer-macos-${{ matrix.arch }}
          path: RPL-*.dmg

  # ================================================================
  # PACKAGE LINUX — Create .deb, .rpm, and AppImage
  # ================================================================
  package-linux:
    name: 📦 Linux Packages
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 📥 Download Binary
        uses: actions/download-artifact@v5
        with:
          name: rpl-linux-x64
          path: target/release/

      - name: 🔧 Make Binary Executable
        run: chmod +x target/release/rpl

      - name: 🦀 Setup Rust (for cargo-deb)
        uses: dtolnay/rust-toolchain@stable

      - name: 📦 Install Packaging Tools
        run: |
          cargo install cargo-deb --locked
          cargo install cargo-generate-rpm --locked

      - name: 🏗️ Build .deb Package
        run: cargo deb -p rpl --no-build
        continue-on-error: true

      - name: 🏗️ Build .rpm Package
        run: cargo generate-rpm -p crates/cli
        continue-on-error: true

      - name: 🏗️ Build AppImage
        run: |
          chmod +x installer/linux/build-appimage.sh
          installer/linux/build-appimage.sh

      - name: 📤 Upload Linux Packages
        uses: actions/upload-artifact@v5
        with:
          name: installer-linux
          path: |
            target/debian/*.deb
            target/generate-rpm/*.rpm
            RPL-*.AppImage

  # ================================================================
  # RELEASE — Create GitHub Release with all installers
  # ================================================================
  release:
    name: 🚀 Publish Release
    needs: [package-windows, package-macos, package-linux]
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Download All Artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts/

      - name: 📋 List Artifacts
        run: find artifacts/ -type f | head -50

      - name: 🎉 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "RPL ${{ github.ref_name }}"
          body: |
            ## 🎉 Rakoda Programming Language ${{ github.ref_name }}
            
            ### 📥 Download Installer
            
            | Platform | File |
            |----------|------|
            | 🪟 Windows | `RPL-Setup-1.0.0.exe` |
            | 🍎 macOS (Apple Silicon) | `RPL-1.0.0-arm64.dmg` |
            | 🍎 macOS (Intel) | `RPL-1.0.0-x64.dmg` |
            | 🐧 Linux (Debian/Ubuntu) | `rpl_1.0.0_amd64.deb` |
            | 🐧 Linux (AppImage) | `RPL-1.0.0-x86_64.AppImage` |
            
            ### 🚀 Cara Install
            
            **Windows:** Download `RPL-Setup-1.0.0.exe` → Klik Install → Selesai!
            
            **macOS:** Download `.dmg` → Buka → Klik `.pkg` → Install
            
            **Linux (Debian/Ubuntu):**
            ```bash
            sudo dpkg -i rpl_1.0.0_amd64.deb
            ```
            
            **Linux (AppImage):**
            ```bash
            chmod +x RPL-1.0.0-x86_64.AppImage
            ./RPL-1.0.0-x86_64.AppImage --version
            ```
            
            ### ✅ Verifikasi
            ```bash
            rpl --version
            rpl run examples/matematika.rpl
            ```
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.AppImage
          draft: false
          prerelease: false
