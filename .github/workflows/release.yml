name: 🚀 Release RPL Installer

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ================================================================
  # BUILD — Compile RPL for each platform
  # ================================================================
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: rpl.exe
            artifact: rpl-windows-x64

          - name: Windows x86 (32-bit)
            os: windows-latest
            target: i686-pc-windows-msvc
            binary: rpl.exe
            artifact: rpl-windows-x86

          - name: macOS Intel
            os: macos-14
            target: x86_64-apple-darwin
            binary: rpl
            artifact: rpl-macos-x64

          - name: macOS Apple Silicon
            os: macos-14
            target: aarch64-apple-darwin
            binary: rpl
            artifact: rpl-macos-arm64

          - name: Linux x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: rpl
            artifact: rpl-linux-x64

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 📦 Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: 🔨 Build Release
        run: cargo build --release --target ${{ matrix.target }}

      - name: ✅ Test Binary
        run: ./target/${{ matrix.target }}/release/${{ matrix.binary }} --version
        shell: bash

      - name: 📤 Upload Binary Artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  # ================================================================
  # PACKAGE WINDOWS — Create .exe installer with NSIS
  # ================================================================
  package-windows:
    name: 📦 Windows Installer (${{ matrix.arch }})
    needs: build
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - arch: x64
            artifact: rpl-windows-x64
          - arch: x86
            artifact: rpl-windows-x86
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 📥 Download Binary
        uses: actions/download-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: staging/

      - name: 📁 Prepare Installer Files
        shell: bash
        run: |
          mkdir -p staging/examples staging/documentation
          cp examples/*.rpl staging/examples/ 2>/dev/null || true
          cp -r documentation/* staging/documentation/ 2>/dev/null || true
          cp LICENSE staging/

      - name: 🔧 Install Inno Setup
        run: choco install innosetup -y

      - name: 🏗️ Build Inno Setup Installer
        shell: cmd
        run: |
          copy installer\inno\rpl-setup.iss staging\
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppArch="${{ matrix.arch }}" "staging\rpl-setup.iss"

      - name: 📤 Upload Windows Installer
        uses: actions/upload-artifact@v5
        with:
          name: installer-windows-${{ matrix.arch }}
          path: staging/RPL-Setup-*.exe

  # ================================================================
  # PACKAGE MACOS — Create .dmg
  # ================================================================
  package-macos:
    name: 📦 macOS DMG (${{ matrix.arch }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-13
            arch: x64
            artifact: rpl-macos-x64
          - os: macos-14
            arch: arm64
            artifact: rpl-macos-arm64
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 📥 Download Binary
        uses: actions/download-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: target/release/

      - name: 🔧 Make Binary Executable & Ad-hoc Codesign
        run: |
          chmod +x target/release/rpl
          codesign --force --deep -s - target/release/rpl

      - name: 🏗️ Build DMG
        run: |
          chmod +x installer/macos/build-dmg.sh
          installer/macos/build-dmg.sh ${{ matrix.arch }}

      - name: 📤 Upload macOS DMG
        uses: actions/upload-artifact@v5
        with:
          name: installer-macos-${{ matrix.arch }}
          path: RPL-*.dmg

  # ================================================================
  # PACKAGE LINUX — Create .deb, .rpm, and AppImage
  # ================================================================
  package-linux:
    name: 📦 Linux Packages
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 📥 Download Binary
        uses: actions/download-artifact@v5
        with:
          name: rpl-linux-x64
          path: target/release/

      - name: 🔧 Make Binary Executable
        run: chmod +x target/release/rpl

      - name: 🦀 Setup Rust (for cargo-deb)
        uses: dtolnay/rust-toolchain@stable

      - name: 📦 Install Packaging Tools
        run: |
          cargo install cargo-deb --locked
          cargo install cargo-generate-rpm --locked

      - name: 🏗️ Build .deb Package
        run: cargo deb -p rpl --no-build
        continue-on-error: true

      - name: 🏗️ Build .rpm Package
        run: cargo generate-rpm -p crates/cli
        continue-on-error: true

      - name: 🏗️ Build AppImage
        run: |
          chmod +x installer/linux/build-appimage.sh
          export APPIMAGE_EXTRACT_AND_RUN=1
          installer/linux/build-appimage.sh

      - name: 📤 Upload Linux Packages
        uses: actions/upload-artifact@v5
        with:
          name: installer-linux
          path: |
            target/debian/*.deb
            target/generate-rpm/*.rpm
            RPL-*.AppImage

  # ================================================================
  # RELEASE — Create GitHub Release with all installers
  # ================================================================
  release:
    name: 🚀 Publish Release
    needs: [package-windows, package-macos, package-linux]
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Download All Artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts/

      - name: 📋 List Artifacts
        run: find artifacts/ -type f | head -50

      - name: 🎉 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "RPL ${{ github.ref_name }}"
          body: |
            ## 🎉 Rakoda Programming Language ${{ github.ref_name }}
            
            ### 📥 Download Installer
            
            | Platform | File |
            |----------|------|
            | 🪟 Windows (64-bit) | `RPL-Setup-1.0.0-x64.exe` |
            | 🪟 Windows (32-bit) | `RPL-Setup-1.0.0-x86.exe` |
            | 🍎 macOS (Apple Silicon) | `RPL-1.0.0-arm64.dmg` |
            | 🍎 macOS (Intel) | `RPL-1.0.0-x64.dmg` |
            | 🐧 Linux (Debian/Ubuntu) | `rpl_1.0.0_amd64.deb` |
            | 🐧 Linux (AppImage) | `RPL-1.0.0-x86_64.AppImage` |
            
            ### 🚀 Cara Install
            
            **Windows:** Download file `.exe` sesuai tipe bit OS Anda (64-bit / 32-bit) → Klik Install → Selesai!
            
            **macOS:** Download `.dmg` → Buka → Klik `.pkg` → Install
            
            **Linux (Debian/Ubuntu):**
            ```bash
            sudo dpkg -i rpl_1.0.0_amd64.deb
            ```
            
            **Linux (AppImage):**
            ```bash
            chmod +x RPL-1.0.0-x86_64.AppImage
            ./RPL-1.0.0-x86_64.AppImage --version
            ```
            
            ### ✅ Verifikasi
            ```bash
            rpl --version
            rpl run examples/matematika.rpl
            ```
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.AppImage
          draft: false
          prerelease: false
